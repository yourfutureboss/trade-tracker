name: update-prices        # ← whatever yours is called, keep it
on:
  schedule:
    - cron: "0 22 * * 1-5"
  workflow_dispatch:

permissions:              # ← insertion 1, before jobs:
  contents: read
  issues: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      # ...your existing checkout / python / update_prices steps stay as-is...

      - name: Check triggers and alert     # ← insertion 2, last step
        if: always()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
        run: python check_triggers.py
